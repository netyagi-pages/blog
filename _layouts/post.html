---
layout: default
---

<article class="post-card">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-date">{{ page.date | date: "%Y-%m-%d" }}</p>
  </header>

  <div class="content-viewer content-viewer--full">
    <div class="content-viewer__viewport">
      <div class="content-viewer__flow">
        {{ content }}
      </div>
    </div>
  </div>
</article>
